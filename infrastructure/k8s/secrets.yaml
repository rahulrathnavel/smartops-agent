# ─────────────────────────────────────────────────────────────────
# SmartOps Agent Secrets
# Replace <BASE64_ENCODED_VALUE> with actual base64-encoded values.
# Example: echo -n "your-value" | base64
# ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: smartops-secrets
  namespace: smartops-system
type: Opaque
data:
  # NVIDIA NIM API key
  NVIDIA_API_KEY: ""
  # Pinecone API key
  PINECONE_API_KEY: ""
  # GitHub Personal Access Token
  GITHUB_TOKEN: ""
  # Slack bot OAuth token
  SLACK_BOT_TOKEN: ""
  # Slack signing secret
  SLACK_SIGNING_SECRET: ""
