# ─────────────────────────────────────────────────────────────────
# SmartOps Agent Secrets
# This file is NOT committed with real values.
# Populate locally before kubectl apply:
#   echo -n "your-value" | base64
# ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: smartops-secrets
  namespace: smartops-system
type: Opaque
data:
  # NVIDIA NIM API key (base64 encoded)
  NVIDIA_API_KEY: REPLACE_WITH_BASE64
  # Pinecone API key (base64 encoded)
  PINECONE_API_KEY: REPLACE_WITH_BASE64
  # GitHub Personal Access Token (base64 encoded)
  GITHUB_TOKEN: REPLACE_WITH_BASE64
  # Slack bot OAuth token (base64 encoded)
  SLACK_BOT_TOKEN: REPLACE_WITH_BASE64
  # Slack signing secret (base64 encoded)
  SLACK_SIGNING_SECRET: REPLACE_WITH_BASE64
