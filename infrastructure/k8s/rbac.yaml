apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: smartops-pod-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: smartops-pod-reader-binding
subjects:
  - kind: ServiceAccount
    name: default
    namespace: smartops-system
roleRef:
  kind: ClusterRole
  name: smartops-pod-reader
  apiGroup: rbac.authorization.k8s.io
