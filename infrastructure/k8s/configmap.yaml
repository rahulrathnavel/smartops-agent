apiVersion: v1
kind: ConfigMap
metadata:
  name: smartops-config
  namespace: smartops-system
data:
  # Slack channel ID where incidents are posted
  SLACK_CHANNEL_ID: ""
  # AWS resources (populated after terraform apply)
